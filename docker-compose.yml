name: booking

services:
  booking-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: booking-platform-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - booking-sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  booking-api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    container_name: booking-api
    restart: unless-stopped
    depends_on:
      booking-sql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Staging}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__BookingDatabase: "Server=booking-sql,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "${API_PORT:-5000}:8080"

  booking-blazor:
    build:
      context: .
      dockerfile: Dockerfile.BlazorApp
    container_name: booking-blazor
    restart: unless-stopped
    depends_on:
      - booking-api
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Staging}"
      ASPNETCORE_URLS: "http://+:8080"
      BookingApi__BaseUrl: "${API_URL}"
    ports:
      - "${BLAZOR_PORT:-5001}:8080"

volumes:
  booking-sql-data:
